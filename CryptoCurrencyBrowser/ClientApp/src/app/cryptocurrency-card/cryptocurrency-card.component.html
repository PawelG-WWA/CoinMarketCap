<div style="border: 1px solid black" (click)="goToDetails(cryptocurrencyCard.id)">
    <p>name: {{ cryptocurrencyCard.name}}</p>
    <p>symbol: {{ cryptocurrencyCard.symbol}}</p>
    <p>price: {{ cryptocurrencyCard.currentPrice}}</p>
    <p>marketCap: {{ cryptocurrencyCard.marketCap}}</p>
    <p>volume: {{ cryptocurrencyCard.volume24h}}</p>
    <p>% change: {{ cryptocurrencyCard.percentChange24h}}</p>
</div>
